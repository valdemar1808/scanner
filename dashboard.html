<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учёт оборудования — где что находится</title>
<script src="./config.js"></script>
<script src="./auth.js"></script>
<style>
  :root{ --bg:#10151c; --panel:#1a212b; --panel-2:#212a36; --accent:#ff8a3d; --accent-2:#3ddc97;
    --text:#eef1f5; --text-dim:#8b96a5; --border:#2c3644; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; min-height:100vh; }
  .app{ max-width:960px; margin:0 auto; padding:20px 16px 50px; }
  header{ text-align:center; margin-bottom:14px; }
  header .tag{ display:inline-block; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent);
    background:rgba(255,138,61,.12); border:1px solid rgba(255,138,61,.35); padding:4px 10px; border-radius:999px; margin-bottom:10px; }
  h1{ font-size:22px; margin:0 0 4px; } header p{ color:var(--text-dim); font-size:14px; margin:0; }
  .top-links{ display:flex; justify-content:center; gap:14px; margin:12px 0; flex-wrap:wrap; }
  .top-links a{ color:var(--accent); font-size:13px; text-decoration:none; border-bottom:1px dashed var(--accent); }
  .userbar{ text-align:center; font-size:13px; margin-bottom:20px; }

  .layout{ display:flex; gap:18px; align-items:flex-start; }
  @media (max-width:680px){ .layout{ flex-direction:column; } }
  nav.sidebar{ display:flex; flex-direction:column; gap:8px; background:var(--panel); border:1px solid var(--border);
    border-radius:14px; padding:10px; min-width:220px; }
  @media (max-width:680px){ nav.sidebar{ flex-direction:row; overflow-x:auto; min-width:0; } }
  nav.sidebar button{ background:transparent; border:1px solid transparent; color:var(--text); text-align:left;
    padding:12px 14px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap; }
  nav.sidebar button.active{ background:var(--accent); color:#1a1206; }
  nav.sidebar button:not(.active):hover{ background:var(--panel-2); }

  main{ flex:1; min-width:0; }
  .card{ background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px; margin-bottom:14px; }
  .card-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .card h2{ margin:0; font-size:17px; }
  table{ width:100%; border-collapse:collapse; font-size:14px; }
  th{ text-align:left; color:var(--text-dim); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.05em;
    padding:8px 10px; border-bottom:1px solid var(--border); }
  td{ padding:10px; border-bottom:1px solid var(--border); }
  tr:last-child td{ border-bottom:none; }
  .empty{ color:var(--text-dim); font-size:14px; padding:10px 0; }
  .loading{ color:var(--text-dim); font-size:14px; }
  .err{ color:#ff5d5d; font-size:14px; }
  .badge{ display:inline-block; padding:3px 8px; border-radius:999px; font-size:12px; background:rgba(61,220,151,.15);
    color:var(--accent-2); border:1px solid rgba(61,220,151,.4); }
  .refresh-btn{ background:var(--panel-2); border:1px solid var(--border); color:var(--text); padding:8px 14px;
    border-radius:10px; font-size:13px; cursor:pointer; }
  .rack-tag{ color:var(--text-dim); font-size:12px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="tag">Учёт оборудования</span>
    <h1>Где сейчас оборудование</h1>
    <p>Выберите склад слева</p>
  </header>
  <div class="top-links">
    <a href="./index.html">← К сканеру</a>
    <a href="./admin.html">Управление оборудованием →</a>
  </div>
  <div class="userbar" id="userbar"></div>

  <div class="card" style="margin-bottom:14px;">
    <div class="card-header">
      <h2>Поиск оборудования</h2>
      <button class="refresh-btn" id="exportBtn">Скачать отчёт (CSV)</button>
    </div>
    <input id="searchInput" placeholder="Название или серийный номер…" style="width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:var(--panel-2); color:var(--text); font-size:15px; box-sizing:border-box;">
    <div id="searchResults" style="margin-top:10px;"></div>
  </div>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main>
      <div class="card">
        <div class="card-header"><h2 id="locTitle">—</h2><button class="refresh-btn" id="refreshBtn">Обновить</button></div>
        <div id="content" class="loading">Загрузка…</div>
      </div>
      <div class="card">
        <div class="card-header"><h2>Последние операции по этому складу</h2></div>
        <div id="movements" class="loading">Загрузка…</div>
      </div>
    </main>
  </div>

  <div id="historyModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:999; align-items:center; justify-content:center; padding:20px;">
    <div style="background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:20px; max-width:600px; width:100%; max-height:80vh; overflow:auto;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <h2 id="historyTitle" style="margin:0; font-size:17px;">История</h2>
        <button class="refresh-btn" id="closeHistoryBtn">Закрыть</button>
      </div>
      <div id="historyContent" class="loading">Загрузка…</div>
    </div>
  </div>
</div>

<script>
requireLogin(()=>{ renderUserBadge('userbar'); init(); });

const LOCATIONS = ["Склад Офис 2 этаж", "Склад ОЗиЛ", "НТЦ"];
let currentLocation = LOCATIONS[0];
let racksCache = [];

const sidebar = document.getElementById('sidebar');
const locTitle = document.getElementById('locTitle');
const content = document.getElementById('content');
const movementsBox = document.getElementById('movements');

function init(){
  LOCATIONS.forEach(loc=>{
    const b = document.createElement('button');
    b.textContent = loc;
    if(loc === currentLocation) b.classList.add('active');
    b.addEventListener('click', ()=>{
      currentLocation = loc;
      [...sidebar.children].forEach(c=>c.classList.remove('active'));
      b.classList.add('active');
      loadData();
    });
    sidebar.appendChild(b);
  });
  document.getElementById('refreshBtn').addEventListener('click', loadData);
  loadData();
}

function rackName(id){
  const r = racksCache.find(x=>x.id===id);
  return r ? r.name : id;
}

async function loadData(){
  locTitle.textContent = currentLocation;
  content.className = 'loading'; content.textContent = 'Загрузка…';
  movementsBox.className = 'loading'; movementsBox.textContent = 'Загрузка…';

  try{
    racksCache = await sbGet('racks?select=*');

    const equipment = await sbGet(`equipment?current_location=eq.${encodeURIComponent(currentLocation)}&select=id,name,serial_number,current_location,current_rack,updated_at&order=updated_at.desc`);

    if(equipment.length === 0){
      content.className = 'empty'; content.textContent = 'Сейчас здесь ничего не числится.';
    } else {
      const rows = equipment.map(e => `
        <tr class="eq-row" data-id="${e.id}" data-name="${e.name.replace(/"/g,'&quot;')}" style="cursor:pointer;">
          <td>${e.name} <span class="rack-tag">(${e.id})</span></td>
          <td>${e.serial_number || '—'}</td>
          <td>${e.current_rack ? rackName(e.current_rack) : '—'}</td>
          <td>${new Date(e.updated_at).toLocaleString('ru-RU')}</td>
        </tr>`).join('');
      content.className = '';
      content.innerHTML = `<table><thead><tr><th>Оборудование</th><th>С/Н</th><th>Стеллаж</th><th>Последнее перемещение</th></tr></thead><tbody>${rows}</tbody></table>`;
      content.querySelectorAll('.eq-row').forEach(tr=>{
        tr.addEventListener('click', ()=> showHistory(tr.dataset.id, tr.dataset.name));
      });
    }

    const movUrl = `movements?or=(from_location.eq.${encodeURIComponent(currentLocation)},to_location.eq.${encodeURIComponent(currentLocation)})&select=*&order=created_at.desc&limit=25`;
    const movements = await sbGet(movUrl);

    if(movements.length === 0){
      movementsBox.className = 'empty'; movementsBox.textContent = 'Пока нет операций по этому складу.';
    } else {
      const rows = movements.map(m => `
        <tr>
          <td><span class="badge">${m.type}</span></td>
          <td>${m.equipment_name || m.equipment_id}</td>
          <td>${m.from_location || '—'}${m.rack_from ? ' ('+rackName(m.rack_from)+')' : ''} → ${m.to_location || '—'}${m.rack_to ? ' ('+rackName(m.rack_to)+')' : ''}</td>
          <td>${m.user_name || '—'}</td>
          <td>${new Date(m.created_at).toLocaleString('ru-RU')}</td>
        </tr>`).join('');
      movementsBox.className = '';
      movementsBox.innerHTML = `<table><thead><tr><th>Тип</th><th>Оборудование</th><th>Маршрут</th><th>Кто</th><th>Дата</th></tr></thead><tbody>${rows}</tbody></table>`;
    }
  } catch(e){
    content.className = 'err'; content.textContent = 'Ошибка загрузки: ' + e.message;
    movementsBox.className = 'err'; movementsBox.textContent = '—';
  }
}

// ===== Поиск оборудования =====
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', (e)=>{
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  searchTimer = setTimeout(()=> runSearch(q), 300);
});

async function runSearch(q){
  const box = document.getElementById('searchResults');
  if(!q){ box.innerHTML = ''; return; }
  box.innerHTML = '<div class="loading">Поиск…</div>';
  try{
    const url = `equipment?or=(name.ilike.*${encodeURIComponent(q)}*,serial_number.ilike.*${encodeURIComponent(q)}*)&select=*&limit=20`;
    const results = await sbGet(url);
    if(results.length === 0){ box.innerHTML = '<div class="empty">Ничего не найдено.</div>'; return; }
    box.innerHTML = results.map(e => `
      <div class="eq-row" data-id="${e.id}" data-name="${e.name.replace(/"/g,'&quot;')}"
        style="cursor:pointer; padding:10px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
        <span><b>${e.name}</b> <span class="rack-tag">S/N: ${e.serial_number||'—'}</span></span>
        <span class="rack-tag">${e.current_location||'—'}${e.current_rack ? ' · '+rackName(e.current_rack) : ''}</span>
      </div>`).join('');
    box.querySelectorAll('.eq-row').forEach(row=>{
      row.addEventListener('click', ()=> showHistory(row.dataset.id, row.dataset.name));
    });
  }catch(e){ box.innerHTML = '<div class="err">Ошибка поиска: '+e.message+'</div>'; }
}

// ===== История конкретного оборудования =====
async function showHistory(equipmentId, equipmentName){
  const modal = document.getElementById('historyModal');
  const title = document.getElementById('historyTitle');
  const body = document.getElementById('historyContent');
  title.textContent = 'История: ' + equipmentName;
  body.className = 'loading'; body.textContent = 'Загрузка…';
  modal.style.display = 'flex';
  try{
    const movements = await sbGet(`movements?equipment_id=eq.${encodeURIComponent(equipmentId)}&select=*&order=created_at.desc`);
    if(movements.length === 0){ body.className='empty'; body.textContent = 'Пока нет операций по этой единице оборудования.'; return; }
    const rows = movements.map(m => `
      <tr>
        <td><span class="badge">${m.type}</span></td>
        <td>${m.from_location || '—'}${m.rack_from ? ' ('+rackName(m.rack_from)+')' : ''} → ${m.to_location || '—'}${m.rack_to ? ' ('+rackName(m.rack_to)+')' : ''}</td>
        <td>${m.user_name || '—'}</td>
        <td>${new Date(m.created_at).toLocaleString('ru-RU')}</td>
      </tr>`).join('');
    body.className = '';
    body.innerHTML = `<table><thead><tr><th>Тип</th><th>Маршрут</th><th>Кто</th><th>Дата</th></tr></thead><tbody>${rows}</tbody></table>`;
  }catch(e){ body.className='err'; body.textContent = 'Ошибка загрузки: ' + e.message; }
}
document.getElementById('closeHistoryBtn').addEventListener('click', ()=>{
  document.getElementById('historyModal').style.display = 'none';
});

// ===== Экспорт истории в CSV =====
document.getElementById('exportBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('exportBtn');
  btn.textContent = 'Формирую…'; btn.disabled = true;
  try{
    const movements = await sbGet('movements?select=*&order=created_at.desc&limit=5000');
    const header = ['Дата','Тип','Оборудование','ID оборудования','Откуда','Стеллаж (откуда)','Куда','Стеллаж (куда)','Кто выполнил'];
    const csvRows = [header.join(';')];
    movements.forEach(m=>{
      csvRows.push([
        new Date(m.created_at).toLocaleString('ru-RU'),
        m.type,
        (m.equipment_name||'').replace(/;/g,','),
        m.equipment_id,
        m.from_location || '',
        m.rack_from ? rackName(m.rack_from) : '',
        m.to_location || '',
        m.rack_to ? rackName(m.rack_to) : '',
        m.user_name || ''
      ].join(';'));
    });
    const csv = '\uFEFF' + csvRows.join('\n'); // BOM для корректной кириллицы в Excel
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'отчёт_перемещений_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }catch(e){ alert('Ошибка экспорта: ' + e.message); }
  btn.textContent = 'Скачать отчёт (CSV)'; btn.disabled = false;
});
</script>
</body>
</html>
