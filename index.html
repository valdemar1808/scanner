<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Учёт оборудования — сканер</title>
<script src="./html5-qrcode.min.js"></script>
<script src="./config.js"></script>
<script src="./auth.js"></script>
<style>
  :root{
    --bg:#10151c; --panel:#1a212b; --panel-2:#212a36; --accent:#ff8a3d; --accent-2:#3ddc97;
    --text:#eef1f5; --text-dim:#8b96a5; --border:#2c3644; --danger:#ff5d5d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{ background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 16px 40px; }
  .wrap{ width:100%; max-width:480px; }
  header{ text-align:center; margin-bottom: 14px; }
  header .tag{ display:inline-block; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent);
    background:rgba(255,138,61,.12); border:1px solid rgba(255,138,61,.35); padding:4px 10px; border-radius:999px; margin-bottom:10px; }
  h1{ font-size:22px; margin:0 0 4px; font-weight:700; }
  header p{ color:var(--text-dim); font-size:14px; margin:0; }
  .top-links{ display:flex; justify-content:center; gap:14px; margin-bottom:10px; flex-wrap:wrap; }
  .top-links a{ color:var(--accent); font-size:13px; text-decoration:none; border-bottom:1px dashed var(--accent); }
  .userbar{ text-align:center; font-size:13px; margin-bottom:18px; }

  .screen{ display:none; } .screen.active{ display:block; }
  .actions{ display:grid; gap:12px; }
  .action-btn{ display:flex; align-items:center; justify-content:space-between; border:1px solid var(--border);
    border-radius:14px; padding:20px 18px; color:var(--text); font-size:18px; font-weight:700; cursor:pointer; text-align:left; }
  .action-btn small{ display:block; color:var(--text-dim); font-weight:500; font-size:12px; margin-top:3px; }
  .action-btn .arrow{ font-size:20px; }
  #act-prihod{ background:rgba(61,220,151,.10); border-color:rgba(61,220,151,.4); } #act-prihod .arrow{ color:var(--accent-2); }
  #act-otpr{ background:rgba(255,138,61,.10); border-color:rgba(255,138,61,.4); } #act-otpr .arrow{ color:var(--accent); }
  #act-spis{ background:rgba(255,93,93,.10); border-color:rgba(255,93,93,.4); } #act-spis .arrow{ color:var(--danger); }
  .action-btn:active{ filter:brightness(1.15); }

  .panel{ display:none; } .panel.active{ display:block; }
  .panel-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .back-btn{ background:var(--panel); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:10px; font-size:13px; cursor:pointer; }
  .panel-title{ font-size:15px; color:var(--text-dim); } .panel-title b{ color:var(--text); }

  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); margin-bottom:8px; }
  .loc-grid{ display:grid; gap:8px; }
  .loc-btn{ background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:13px 14px; color:var(--text);
    font-size:15px; font-weight:600; text-align:left; cursor:pointer; }
  .loc-btn.selected{ background:var(--accent); color:#1a1206; border-color:var(--accent); }
  .continue-btn{ width:100%; background:var(--accent); color:#1a1206; border:none; padding:14px; border-radius:12px;
    font-weight:700; font-size:15px; cursor:pointer; margin-top:6px; }
  .continue-btn:disabled{ opacity:.4; }

  #reader{ width:100%; border-radius:14px; overflow:hidden; border:1px solid var(--border); background:#000; }
  .scan-step{ margin-bottom:10px; font-size:14px; color:var(--text-dim); text-align:center; }
  .scan-step b{ color:var(--accent); }

  .result{ margin-top:16px; padding:16px; border-radius:14px; border:1px solid var(--border); background:var(--panel); display:none; }
  .result.show{ display:block; } .result.ok{ border-color:rgba(61,220,151,.5); background:rgba(61,220,151,.08); }
  .result.err{ border-color:rgba(255,93,93,.5); background:rgba(255,93,93,.08); }
  .result .label{ font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); margin-bottom:6px; }
  .result .msg{ font-size:16px; font-weight:700; line-height:1.4; }
  .result .time{ font-size:12px; color:var(--text-dim); margin-top:8px; }

  .log{ margin-top:22px; }
  .log h2{ font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); margin:0 0 10px; }
  .log ul{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .log li{ background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:13px;
    display:flex; justify-content:space-between; gap:10px; }
  .log li span.t{ color:var(--text-dim); white-space:nowrap; }
  .clear-log{ margin-top:10px; background:none; border:none; color:var(--text-dim); font-size:12px; text-decoration:underline; cursor:pointer; padding:0; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <span class="tag">Учёт оборудования</span>
    <h1>Перемещение оборудования</h1>
    <p>Выберите тип операции и отсканируйте QR-коды</p>
  </header>

  <div class="top-links">
    <a href="./dashboard.html" id="dashLink">Просмотр складов →</a>
    <a href="./admin.html" id="adminLink">Управление оборудованием →</a>
  </div>
  <div class="userbar" id="userbar"></div>

  <!-- ЭКРАН 1: выбор действия -->
  <section class="screen active" id="screen-main">
    <div class="actions">
      <button class="action-btn" id="act-prihod" data-type="Приход">
        <span>Приход<small>Оборудование поступает на склад</small></span><span class="arrow">›</span>
      </button>
      <button class="action-btn" id="act-otpr" data-type="Отправление">
        <span>Отправление<small>Перемещение между складами</small></span><span class="arrow">›</span>
      </button>
      <button class="action-btn" id="act-spis" data-type="Списание">
        <span>Списание<small>Оборудование выводится из учёта</small></span><span class="arrow">›</span>
      </button>
    </div>
    <div class="log">
      <h2>История сканирований (на этом телефоне)</h2>
      <ul id="logList"></ul>
      <button class="clear-log" id="clearLog">Очистить историю</button>
    </div>
  </section>

  <!-- ЭКРАН 2: выбор склада(ов) -->
  <section class="panel" id="panel-locations">
    <div class="panel-header">
      <button class="back-btn" id="backToMain">← Назад</button>
      <div class="panel-title">Операция: <b id="opTypeLabel">—</b></div>
    </div>
    <div class="field" id="fromField">
      <label>Откуда</label>
      <div class="loc-grid" id="fromGrid"></div>
    </div>
    <div class="field" id="toField">
      <label>Куда</label>
      <div class="loc-grid" id="toGrid"></div>
    </div>
    <button class="continue-btn" id="continueBtn" disabled>Продолжить к сканированию</button>
  </section>

  <!-- ЭКРАН 3: сканер -->
  <section class="panel" id="panel-scan">
    <div class="panel-header">
      <button class="back-btn" id="backToLocations">← Назад</button>
      <div class="panel-title" id="scanSummary"></div>
    </div>
    <div class="scan-step" id="scanStep"></div>
    <div id="reader"></div>
    <div class="result" id="result">
      <div class="label">Результат</div>
      <div class="msg" id="resultMsg"></div>
      <div class="time" id="resultTime"></div>
      <div id="bulkActions" style="display:none; margin-top:14px; flex-direction:column; gap:8px;">
        <button class="continue-btn" id="scanMoreBtn" style="margin-top:0;">Сканировать ещё оборудование</button>
        <button class="back-btn" id="doneBtn" style="width:100%; margin-top:8px; padding:12px;">Готово</button>
      </div>
    </div>
  </section>

</div>

<script>
const LOCATIONS = ["Склад Офис 2 этаж", "Склад ОЗиЛ", "НТЦ"];
const RACK_LOCATIONS = ["Склад Офис 2 этаж", "Склад ОЗиЛ"]; // у НТЦ стеллажей нет

let state = { type:null, from:null, to:null, rackFrom:null, rackTo:null, equipmentId:null, equipmentName:null };
let html5QrCode = null;
let racksCache = null;
let equipmentCache = null;
// scanTarget: 'rackFrom' | 'rackTo' | 'equipment'
let scanQueue = [];

const screenMain = document.getElementById('screen-main');
const panelLocations = document.getElementById('panel-locations');
const panelScan = document.getElementById('panel-scan');
const fromField = document.getElementById('fromField');
const toField = document.getElementById('toField');
const fromGrid = document.getElementById('fromGrid');
const toGrid = document.getElementById('toGrid');
const continueBtn = document.getElementById('continueBtn');
const opTypeLabel = document.getElementById('opTypeLabel');
const scanSummary = document.getElementById('scanSummary');
const scanStep = document.getElementById('scanStep');
const resultBox = document.getElementById('result');
const resultMsg = document.getElementById('resultMsg');
const resultTime = document.getElementById('resultTime');

document.getElementById('dashLink').addEventListener('click', function(e){
  e.preventDefault();
  window.location.href = './dashboard.html?t=' + Date.now();
});
document.getElementById('adminLink').addEventListener('click', function(e){
  e.preventDefault();
  window.location.href = './admin.html?t=' + Date.now();
});

function init(){
  buildLocButtons(fromGrid, 'from');
  buildLocButtons(toGrid, 'to');
  loadCaches();
}

async function loadCaches(){
  try{ racksCache = await sbGet('racks?select=*'); }catch(e){ racksCache = []; }
  try{ equipmentCache = await sbGet('equipment?select=*'); }catch(e){ equipmentCache = []; }
}

function buildLocButtons(container, key){
  container.innerHTML = '';
  LOCATIONS.forEach(loc=>{
    const b = document.createElement('button');
    b.className = 'loc-btn'; b.textContent = loc;
    b.addEventListener('click', ()=>{
      state[key] = loc;
      [...container.children].forEach(c=>c.classList.remove('selected'));
      b.classList.add('selected');
      updateContinueState();
    });
    container.appendChild(b);
  });
}

function updateContinueState(){
  let ok = false;
  if(state.type === 'Приход') ok = !!state.to;
  else if(state.type === 'Списание') ok = !!state.from;
  else if(state.type === 'Отправление') ok = !!state.from && !!state.to && state.from !== state.to;
  continueBtn.disabled = !ok;
}

document.querySelectorAll('.action-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    state = { type: btn.dataset.type, from:null, to:null, rackFrom:null, rackTo:null, equipmentId:null, equipmentName:null };
    opTypeLabel.textContent = state.type;
    [...fromGrid.children, ...toGrid.children].forEach(c=>c.classList.remove('selected'));
    fromField.style.display = (state.type === 'Приход') ? 'none' : 'block';
    toField.style.display = (state.type === 'Списание') ? 'none' : 'block';
    updateContinueState();
    screenMain.classList.remove('active');
    panelLocations.classList.add('active');
  });
});

document.getElementById('backToMain').addEventListener('click', ()=>{
  panelLocations.classList.remove('active'); screenMain.classList.add('active');
});

document.getElementById('continueBtn').addEventListener('click', ()=>{
  let summary = state.type;
  if(state.from) summary += ' · из «' + state.from + '»';
  if(state.to) summary += ' · в «' + state.to + '»';
  scanSummary.textContent = summary;

  // Строим очередь сканирования: стеллаж(и) (если склад с стеллажами), затем оборудование
  scanQueue = [];
  if(state.from && RACK_LOCATIONS.includes(state.from)) scanQueue.push('rackFrom');
  if(state.to && RACK_LOCATIONS.includes(state.to)) scanQueue.push('rackTo');
  scanQueue.push('equipment');

  panelLocations.classList.remove('active');
  panelScan.classList.add('active');
  resultBox.classList.remove('show','ok','err');
  nextScanStep();
});

document.getElementById('backToLocations').addEventListener('click', ()=>{
  stopScanner(); panelScan.classList.remove('active'); panelLocations.classList.add('active');
});

function nextScanStep(){
  if(scanQueue.length === 0){ finalizeMovement(); return; }
  const target = scanQueue[0];
  if(target === 'rackFrom') scanStep.innerHTML = 'Шаг: отсканируйте <b>стеллаж, откуда</b> берём оборудование (' + state.from + ')';
  if(target === 'rackTo') scanStep.innerHTML = 'Шаг: отсканируйте <b>стеллаж, куда</b> ставим оборудование (' + state.to + ')';
  if(target === 'equipment') scanStep.innerHTML = 'Шаг: отсканируйте <b>QR-код оборудования</b>';
  startScanner();
}

function startScanner(){
  if(typeof Html5Qrcode === 'undefined'){
    resultMsg.textContent = 'Файл html5-qrcode.min.js не найден рядом с index.html.';
    resultBox.classList.add('show','err'); return;
  }
  html5QrCode = new Html5Qrcode("reader");
  const config = { fps: 10, qrbox: { width: 240, height: 240 } };
  html5QrCode.start({ facingMode:"environment" }, config, onScanSuccess, ()=>{})
    .catch(err=>{ resultMsg.textContent = "Не удалось открыть камеру: " + err; resultBox.classList.add('show','err'); });
}
function stopScanner(){
  if(html5QrCode){ html5QrCode.stop().then(()=>html5QrCode.clear()).catch(()=>{}); html5QrCode = null; }
}

function onScanSuccess(decodedText){
  if(html5QrCode){ html5QrCode.pause(true); }
  const code = decodedText.trim();
  const target = scanQueue[0];
  const now = new Date().toLocaleString('ru-RU');

  if(target === 'rackFrom' || target === 'rackTo'){
    const rack = (racksCache||[]).find(r => r.id === code);
    if(!rack){
      resultMsg.textContent = 'Это не QR-код стеллажа: ' + code;
      resultBox.classList.remove('ok'); resultBox.classList.add('show','err');
      setTimeout(()=>{ if(html5QrCode){ html5QrCode.resume(); } }, 1800);
      return;
    }
    const expectedLoc = target === 'rackFrom' ? state.from : state.to;
    if(rack.location !== expectedLoc){
      resultMsg.textContent = `Стеллаж «${rack.name}» относится к «${rack.location}», а нужен склад «${expectedLoc}»`;
      resultBox.classList.remove('ok'); resultBox.classList.add('show','err');
      setTimeout(()=>{ if(html5QrCode){ html5QrCode.resume(); } }, 2200);
      return;
    }
    if(target === 'rackFrom') state.rackFrom = rack.id; else state.rackTo = rack.id;
    resultMsg.textContent = `Стеллаж принят: ${rack.name}`;
    resultBox.classList.remove('err'); resultBox.classList.add('show','ok');
    resultTime.textContent = now;
    scanQueue.shift();
    stopScanner();
    setTimeout(nextScanStep, 900);
    return;
  }

  if(target === 'equipment'){
    const eq = (equipmentCache||[]).find(e => e.id === code);
    if(!eq){
      resultMsg.textContent = 'Неизвестный QR-код оборудования: ' + code;
      resultBox.classList.remove('ok'); resultBox.classList.add('show','err');
      setTimeout(()=>{ if(html5QrCode){ html5QrCode.resume(); } }, 1800);
      return;
    }
    // Проверка: соответствует ли текущее место оборудования в базе выбранному "Откуда"
    if((state.type === 'Отправление' || state.type === 'Списание') && state.from && eq.current_location && eq.current_location !== state.from){
      const proceed = confirm(
        `Внимание: по данным базы «${eq.name}» сейчас числится в «${eq.current_location}»` +
        (eq.current_rack ? ` (${rackName(eq.current_rack)})` : '') +
        `, а не в «${state.from}». Продолжить операцию?`
      );
      if(!proceed){
        resultMsg.textContent = 'Операция отменена. Отсканируйте правильное оборудование.';
        resultBox.classList.remove('ok'); resultBox.classList.add('show','err');
        setTimeout(()=>{ if(html5QrCode){ html5QrCode.resume(); } }, 1500);
        return;
      }
    }
    state.equipmentId = eq.id;
    state.equipmentName = eq.name;
    resultMsg.textContent = `Оборудование принято: ${eq.name}`;
    resultBox.classList.remove('err'); resultBox.classList.add('show','ok');
    resultTime.textContent = now;
    scanQueue.shift();
    stopScanner();
    setTimeout(nextScanStep, 900);
    return;
  }
}

async function finalizeMovement(){
  const now = new Date().toLocaleString('ru-RU');
  let message = `${state.equipmentName}: ${state.type.toLowerCase()}`;
  if(state.from) message += `, из «${state.from}»` + (state.rackFrom ? ` (${rackName(state.rackFrom)})` : '');
  if(state.to) message += `, в «${state.to}»` + (state.rackTo ? ` (${rackName(state.rackTo)})` : '');

  resultMsg.textContent = message;
  resultBox.classList.remove('err'); resultBox.classList.add('show','ok');
  resultTime.textContent = now + ' · отправка в базу…';
  addToLog(message, now);

  try{
    await sbPost('movements', [{
      equipment_id: state.equipmentId,
      equipment_name: state.equipmentName,
      type: state.type,
      from_location: state.from || null,
      to_location: state.to || null,
      rack_from: state.rackFrom || null,
      rack_to: state.rackTo || null,
      user_name: currentUser()
    }]);
    const newLocation = state.type === 'Списание' ? 'Списано' : state.to;
    const newRack = state.type === 'Списание' ? null : (state.rackTo || null);
    await sbPatch('equipment', 'id=eq.' + encodeURIComponent(state.equipmentId), {
      current_location: newLocation, current_rack: newRack, updated_at: new Date().toISOString()
    });
    resultTime.textContent = now + ' · сохранено в базе ✓';
    await loadCaches();
  } catch(err){
    resultTime.textContent = now + ' · ошибка отправки в базу: ' + err.message;
  }

  document.getElementById('bulkActions').style.display = 'flex';
}

function resetForNextEquipment(){
  document.getElementById('bulkActions').style.display = 'none';
  resultBox.classList.remove('show','ok','err');
  state.equipmentId = null; state.equipmentName = null;
  scanQueue = ['equipment'];
  nextScanStep();
}

function finishScanning(){
  stopScanner();
  document.getElementById('bulkActions').style.display = 'none';
  panelScan.classList.remove('active');
  screenMain.classList.add('active');
}

document.getElementById('scanMoreBtn').addEventListener('click', resetForNextEquipment);
document.getElementById('doneBtn').addEventListener('click', finishScanning);

function rackName(id){
  const r = (racksCache||[]).find(x=>x.id===id);
  return r ? r.name : id;
}

const logList = document.getElementById('logList');
function loadLog(){
  const items = JSON.parse(localStorage.getItem('scanLog') || '[]');
  logList.innerHTML = '';
  items.slice().reverse().forEach(it=>{
    const li = document.createElement('li');
    li.innerHTML = `<span>${it.message}</span><span class="t">${it.time}</span>`;
    logList.appendChild(li);
  });
}
function addToLog(message, time){
  const items = JSON.parse(localStorage.getItem('scanLog') || '[]');
  items.push({ message, time });
  localStorage.setItem('scanLog', JSON.stringify(items));
  loadLog();
}
document.getElementById('clearLog').addEventListener('click', ()=>{ localStorage.removeItem('scanLog'); loadLog(); });
loadLog();

// Запускаем проверку входа только теперь, когда все переменные и функции выше уже определены
requireLogin(()=>{ renderUserBadge('userbar'); init(); });
</script>
</body>
</html>
